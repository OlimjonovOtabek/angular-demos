<button
  [type]="type()"
  [disabled]="disabled() || isLoading()"
  class="relative inline-flex items-center justify-center rounded-lg font-medium transition-all duration-200 active:scale-95"
  [ngClass]="{
    'w-full': fullWidth(),
    'px-3 py-1.5 text-xs gap-1.5': size() === 'sm',
    'px-4 py-2 text-sm gap-2': size() === 'md',
    'px-6 py-3 text-base gap-2.5': size() === 'lg',

    'bg-primary text-primary-foreground hover:bg-primary/90 shadow-sm ring-ring':
      variant() === 'primary',
    'bg-muted text-foreground hover:bg-muted/80 ring-ring': variant() === 'secondary',
    'bg-background border border-border text-foreground hover:bg-muted/50 ring-ring shadow-sm':
      variant() === 'outline',
    'bg-transparent text-muted-foreground hover:bg-muted hover:text-foreground ring-ring':
      variant() === 'ghost',
    'bg-destructive text-destructive-foreground hover:bg-destructive/90 ring-ring':
      variant() === 'danger',
  }"
  [class]="styleClass() ?? ''"
>
  @if (isLoading()) {
    <svg
      class="animate-spin h-4 w-4"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
    >
      <circle
        class="opacity-25"
        cx="12"
        cy="12"
        r="10"
        stroke="currentColor"
        stroke-width="4"
      ></circle>
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
      ></path>
    </svg>
    <span class="sr-only">Loading...</span>
  }

  <span class="flex items-center" [ngClass]="{ 'gap-2': true }">
    <ng-content></ng-content>
  </span>
</button>
